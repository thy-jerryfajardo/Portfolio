  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="contact-page">
  <a class="skip-link" href="#mainContent">Skip to content</a>
  <header class="site-header">
    <nav class="navbar container" aria-label="Primary navigation">
      <a href="index.html" class="logo">JF</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation" aria-expanded="false"><span></span><span></span><span></span></button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li><li><a href="about.html">About</a></li><li><a href="skills.html">Skills</a></li><li><a href="projects.html">Projects</a></li><li><a href="certifications.html">Certifications</a></li><li><a href="experience.html">Experience</a></li><li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">☀️</button>
    </nav>
  </header>
  <main id="mainContent">
    <section class="section">
      <div class="container reveal contact-centered">
        <h1 class="section-title">Contact</h1>
        <p class="section-intro">Let’s build something impactful together.</p>
        <form class="contact-form glass-card" id="contactForm">
          <label for="name">Name</label><input id="name" name="name" type="text" required />
          <label for="email">Email</label><input id="email" name="email" type="email" required />
          <label for="message">Message</label><textarea id="message" name="message" rows="5" required></textarea>
          <button type="submit" class="btn-primary">Send Message</button><p id="formStatus" class="form-status" aria-live="polite"></p>
        </form>
        <div class="social-links"><a href="https://github.com/thy-jerryfajardo" target="_blank" rel="noopener noreferrer">GitHub</a><a href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a><a href="mailto:hello@jerryfajardo.dev">Email</a></div>
      </div>
    </section>
  </main>
  <footer class="site-footer"><div class="container"><p>&copy; <span id="year"></span> Jerry Fajardo. All rights reserved.</p></div></footer>
  <button type="button" id="backToTop" class="back-to-top" aria-label="Back to top">↑</button>
