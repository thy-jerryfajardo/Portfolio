<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Jerry Fajardo for freelance and full-time opportunities." />
  <title>Contact | Jerry Fajardo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="contact-page">
  <a class="skip-link" href="#mainContent">Skip to content</a>
  <main id="mainContent">
    <section class="section">
      <div class="container reveal contact-centered">
        <h1 class="section-title">Contact</h1>
        <p class="section-intro">Let's build something impactful together.</p>
        <form class="contact-form glass-card" id="contactForm">
          <label for="name">Name</label><input id="name" name="name" type="text" required />
          <label for="email">Email</label><input id="email" name="email" type="email" required />
          <label for="message">Message</label><textarea id="message" name="message" rows="5" required></textarea>
          <button type="submit" class="btn-primary">Send Message</button><p id="formStatus" class="form-status" aria-live="polite"></p>
        </form>
        <div class="social-links"><a href="https://github.com/thy-jerryfajardo" target="_blank" rel="noopener noreferrer">GitHub</a><a href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a><a href="mailto:hello@jerryfajardo.dev">Email</a></div>
      </div>
    </section>
  </main>
  <script src="../js/navbar-loader.js"></script>
  <script src="../js/footer-loader.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
